    <style>
        :root {
            --primary-color: #f7931a;

        .win-theme {

            --accent-color: #90ff90;

        }

        @keyframes celebrate {
            0% { transform: translateY(0) rotate(0deg) scale(1); }
            25% { transform: translateY(-20px) rotate(10deg) scale(1.1); }
            50% { transform: translateY(-40px) rotate(-10deg) scale(1.2); }
            75% { transform: translateY(-20px) rotate(10deg) scale(1.1); }
            100% { transform: translateY(0) rotate(0deg) scale(1); }
        }

        @keyframes sparkle {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .celebrate {
            animation: celebrate 1s ease-in-out infinite !important;
        }

        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: sparkle 1s ease-in-out infinite;
        }

        .sparkle:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 30%; left: 50%; animation-delay: 0.2s; }
        .sparkle:nth-child(3) { top: 60%; left: 80%; animation-delay: 0.4s; }
        .sparkle:nth-child(4) { top: 80%; left: 30%; animation-delay: 0.6s; }
        .sparkle:nth-child(5) { top: 40%; left: 70%; animation-delay: 0.8s; }

        body {

            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;

        .container {

        .header {

            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(247, 147, 26, 0.5);

        .header::before {
            content: '';

        h1 {

        .subtitle {

        }

        .lottery-container {

            box-shadow: 0 0 30px rgba(247, 147, 26, 0.3);

        #matrix {
            display: none;
            margin: 30px 0;

            overflow: hidden;

        .wallet-image {

            right: -100px;

            border-radius: 50%;

            animation: slotMachine 1.5s linear infinite;

        .wallet-image:nth-child(1) { 
            filter: drop-shadow(0 0 15px #f7931a);
            animation-delay: 0s;
        }
        .wallet-image:nth-child(2) { 
            filter: drop-shadow(0 0 15px #ff9900);
            animation-delay: 0.3s;
        }
        .wallet-image:nth-child(3) { 
            filter: drop-shadow(0 0 15px #ffd700);
            animation-delay: 0.6s;
        }
        .wallet-image:nth-child(4) { 
            filter: drop-shadow(0 0 15px #ff9900);
            animation-delay: 0.9s;
        }
        .wallet-image:nth-child(5) { 
            filter: drop-shadow(0 0 15px #f7931a);
            animation-delay: 1.2s;
        }

        @keyframes slotMachine {
            0% { 
                right: -100px;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% { 
                right: calc(100% + 100px);
                opacity: 0;
            }
        }

        .slot-animation {
            animation: slotMachine 3s linear forwards;
        }

        .slot-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .center-line {
            display: none;

        #start {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--light-color);
            border: none;
            padding: 20px 40px;
            font-size: 1.5em;
            border-radius: 30px;
            cursor: pointer;

        #console {
            margin-top: 30px;

        .result {

            margin: 20px 0;
            padding: 20px;
            border-radius: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;

        @keyframes pulse {
            0% { transform: scale(1); }

        .win {
            background: linear-gradient(135deg, #00ff00, #00cc00);

        .lose {
            background: linear-gradient(135deg, #ff0000, #cc0000);

        .particles {

        .particle {

        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { transform: translateY(-100px) translateX(100px); opacity: 1; }

        .footer {

        .footer a {

        .footer a:hover {

        .credits {

        .donation {

        .btc-address {

            transition: all 0.3s ease;
        }

        .btc-address:hover {
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--accent-color);
        }

        .copy-button {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--light-color);
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Orbitron', sans-serif;
            margin: 20px auto;
            display: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .copy-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(247, 147, 26, 0.5);
        }
    </style>

<body>
    <div class="particles" id="particles"></div>
    <div class="container">
        <div class="header">
            <h1>FreeBTC.fun</h1>

        <div class="lottery-container">

        </div>

    <script>
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particlesContainer.appendChild(particle);
            }
        }

        createParticles();

        let isSpinning = false;
        let currentAttempt = 0;
        const MAX_ATTEMPTS = 50000;
        const TARGET_ADDRESS = '19vkiEajfhuZ8bs8Zu2jgmC6oqZbWqhxhG';
        const CHALLENGE_NUMBER = '69';
        const CHALLENGE_PRIZE = '6.9';
        let hasAttempted = false;

        const urlParams = new URLSearchParams(window.location.search);
        const simulateWin = urlParams.get('win') === 'true';

        async function start() {
            if (isSpinning) return;
            
            isSpinning = true;
            clearLog();
            log('🎯 DESAFIO BITCOIN PUZZLE #69 🎯');
            log(`💰 Carteira: ${TARGET_ADDRESS} 💰`);
            log('🔍 Iniciando busca pela chave privada...');
            await startAnimation();
            
            if (simulateWin) {
                await showResult(true, BigInt('0x1fffffffffffffffff'));
            } else {
                await checkAddresses();
            }
        }

        function startAnimation() {
            return new Promise(resolve => {
                document.getElementById("start").style.display = 'none';    
                document.getElementById("matrix").style.display = 'block';
                setTimeout(resolve, 3000);
            });
        }

        async function checkAddresses() {
            const privateKeyInt = generateRandomNumber(0x100000000000000000, 0x1fffffffffffffffff);
            
            for (let i = 0; i < MAX_ATTEMPTS; i++) {
                const address = generateAddress(privateKeyInt + BigInt(i));
                
                if (address === TARGET_ADDRESS) {
                    await showResult(true, privateKeyInt + BigInt(i));
                    return;
                }
            }
            
            await showResult(false, privateKeyInt + BigInt(MAX_ATTEMPTS));
        }

        async function showResult(success, privateKey) {
            if (success) {
                document.body.classList.add('win-theme');
                
                document.getElementById("matrix").style.display = 'block';
                
                const walletImages = document.querySelectorAll('.wallet-image');
                const containerWidth = document.getElementById("matrix").offsetWidth;
                const imageWidth = 100;
                const totalImages = walletImages.length;
                const totalSpace = containerWidth - (totalImages * imageWidth);
                const spacing = totalSpace / (totalImages + 1);
                
                walletImages.forEach((img, index) => {
                    img.style.animationName = 'none';
                    img.style.right = 'auto';
                    img.style.left = `${spacing + (index * (imageWidth + spacing))}px`;
                    img.style.top = '25px';
                    void img.offsetWidth;
                    img.classList.add('celebrate');
                    img.style.filter = 'drop-shadow(0 0 15px var(--accent-color))';
                    img.style.background = 'radial-gradient(circle, rgba(0, 255, 0, 0.2), transparent)';
                    for (let i = 0; i < 5; i++) {
                        const sparkle = document.createElement('div');
                        sparkle.className = 'sparkle';
                        img.appendChild(sparkle);
                    }
                });

                log(`🎉 JACKPOT! VOCÊ RESOLVEU O DESAFIO #${CHALLENGE_NUMBER}! 🎉\n`);
                log('💰 CHAVE PRIVADA ENCONTRADA: ' + privateKey.toString(16) + ' 💰\n');
                log(`🎰 PARABÉNS! VOCÊ ACABA DE GANHAR ${CHALLENGE_PRIZE} BTC! 🎰\n`);
                log('💝 NÃO ESQUEÇA DA GENTE! FAÇA-NOS UMA DOAÇÃO! 💝');
                
                const copyButton = document.createElement('button');
                copyButton.className = 'copy-button';
                copyButton.textContent = 'Copiar Chave Privada';
                copyButton.style.display = 'block';
                copyButton.onclick = () => {
                    navigator.clipboard.writeText(privateKey.toString(16));
                    copyButton.textContent = 'Chave Copiada!';
                    setTimeout(() => {
                        copyButton.textContent = 'Copiar Chave Privada';
                    }, 2000);
                };
                document.getElementById('console').appendChild(copyButton);
                
                document.getElementById("start").style.display = 'none';
            } else {
                document.getElementById("matrix").style.display = 'none';
                log('❌ NÃO FOI DESSA VEZ! ❌\n');
                log('🎲 MAS NÃO DESISTA! A PRÓXIMA TENTATIVA PODE RESOLVER O DESAFIO! 🎲\n');
                log('🔍 ÚLTIMA CHAVE VERIFICADA: ' + privateKey.toString(16) + '🔍');
                
                const startButton = document.getElementById("start");
                startButton.style.display = '';
                startButton.textContent = 'Tentar a Sorte Novamente!';
            }
            
            hasAttempted = true;
            isSpinning = false;
        }

        function clearLog() {
            document.getElementById('console').innerHTML = '';
        }

        function log(message) {
            const consoleDiv = document.getElementById('console');
            consoleDiv.innerHTML += message + '<br>';
        }

        function generateAddress(privateKeyInt) {
            const privateKey = privateKeyInt.toString(16);
            const EC = elliptic.ec;
            const ec = new EC('secp256k1');
            const keyPair = ec.keyFromPrivate(privateKey, 'hex');
            const publicKey = keyPair.getPublic(true, 'hex');

            const sha256Hash = CryptoJS.SHA256(CryptoJS.enc.Hex.parse(publicKey));
            const ripemd160Hash = CryptoJS.RIPEMD160(sha256Hash);

            const version = '00';
            const versionedHash = version + ripemd160Hash.toString();
            const checksum = CryptoJS.SHA256(CryptoJS.SHA256(CryptoJS.enc.Hex.parse(versionedHash))).toString().substring(0, 8);
            const addressHex = versionedHash + checksum;

            return hexToBase58(addressHex);
        }

        function hexToBase58(hex) {
            const alphabet = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
            const base = BigInt(58);
            let num = BigInt('0x' + hex);
            let encoded = '';
            
            while (num > 0) {
                const remainder = num % base;
                num = num / base;
                encoded = alphabet[remainder] + encoded;
            }

            for (let i = 0; i < hex.length && hex[i] === '0'; i += 2) {
                encoded = '1' + encoded;
            }

            return encoded;
        }

        function generateRandomNumber(min, max) {
            const range = BigInt(max - min);
            const randomBytes = new Uint8Array(32);
            window.crypto.getRandomValues(randomBytes);
            let hexString = Array.from(randomBytes).map(b => b.toString(16).padStart(2, "0")).join('');
            return BigInt(min) + (BigInt(`0x${hexString}`) % range);
        }
    </script>

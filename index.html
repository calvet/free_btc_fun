        :root {
            --primary-color: #f7931a;
            --secondary-color: #ff9900;
            --accent-color: #ffd700;
            --dark-color: #1a1a1a;
            --light-color: #ffffff;
            --success-color: #00ff00;
            --error-color: #ff0000;
        }

        .win-theme {
            --primary-color: #00cc00;
            --secondary-color: #00ff00;
            --accent-color: #90ff90;
            --success-color: #00ff00;
        }

        @keyframes celebrate {
            0% { transform: translateY(0) rotate(0deg) scale(1); }
            25% { transform: translateY(-20px) rotate(10deg) scale(1.1); }
            50% { transform: translateY(-40px) rotate(-10deg) scale(1.2); }
            75% { transform: translateY(-20px) rotate(10deg) scale(1.1); }
            100% { transform: translateY(0) rotate(0deg) scale(1); }
        }

        @keyframes sparkle {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .celebrate {
            animation: celebrate 1s ease-in-out infinite !important;
        }

        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: sparkle 1s ease-in-out infinite;
        }

        .sparkle:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 30%; left: 50%; animation-delay: 0.2s; }
        .sparkle:nth-child(3) { top: 60%; left: 80%; animation-delay: 0.4s; }
        .sparkle:nth-child(4) { top: 80%; left: 30%; animation-delay: 0.6s; }
        .sparkle:nth-child(5) { top: 40%; left: 70%; animation-delay: 0.8s; }

        body {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #000000, #1a1a1a);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--light-color);
        }

        .container {
            max-width: 1000px;
            width: 95%;
            margin: 20px auto;
            text-align: center;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--light-color);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(247, 147, 26, 0.5);
            border: 3px solid var(--accent-color);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: clamp(2em, 8vw, 4em);
            margin: 0;
            text-shadow: 0 0 10px var(--accent-color),
                         0 0 20px var(--accent-color),
                         0 0 30px var(--accent-color);
            letter-spacing: 2px;
            position: relative;
            word-wrap: break-word;
        }

        .subtitle {
            font-size: 1.5em;
            margin-top: 15px;
            text-shadow: 0 0 5px var(--accent-color);
            position: relative;
        }

        .lottery-container {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(247, 147, 26, 0.3);
            border: 2px solid var(--primary-color);
            backdrop-filter: blur(10px);
        }

        #matrix {
            display: none;
            margin: 30px 0;
            width: 100%;
            height: 150px;
            position: relative;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 2px solid var(--primary-color);
        }

        .wallet-image {
            width: 100px;
            height: 100px;
            position: absolute;
            right: -100px;
            top: 25px;
            filter: drop-shadow(0 0 15px var(--accent-color));
            transition: all 0.3s ease;
            border-radius: 50%;
            padding: 5px;
            background: radial-gradient(circle, rgba(247, 147, 26, 0.2), transparent);
            animation: slotMachine 1.5s linear infinite;
        }

        .wallet-image:nth-child(1) { 
            filter: drop-shadow(0 0 15px #f7931a);
            animation-delay: 0s;
        }
        .wallet-image:nth-child(2) { 
            filter: drop-shadow(0 0 15px #ff9900);
            animation-delay: 0.3s;
        }
        .wallet-image:nth-child(3) { 
            filter: drop-shadow(0 0 15px #ffd700);
            animation-delay: 0.6s;
        }
        .wallet-image:nth-child(4) { 
            filter: drop-shadow(0 0 15px #ff9900);
            animation-delay: 0.9s;
        }
        .wallet-image:nth-child(5) { 
            filter: drop-shadow(0 0 15px #f7931a);
            animation-delay: 1.2s;
        }

        @keyframes slotMachine {
            0% { 
                right: -100px;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% { 
                right: calc(100% + 100px);
                opacity: 0;
            }
        }

        .slot-animation {
            animation: slotMachine 3s linear forwards;
        }

        .slot-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .center-line {
            display: none;
        }

        #start {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--light-color);
            border: none;
            padding: 20px 40px;
            font-size: 1.5em;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(247, 147, 26, 0.5);
            position: relative;
            overflow: hidden;
        }

        #start:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(247, 147, 26, 0.8);
        }

        #start::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            animation: rotate 5s linear infinite;
        }

        #console {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            min-height: 120px;
            font-family: 'Orbitron', sans-serif;
            text-align: left;
            white-space: pre-wrap;
            border: 1px solid var(--primary-color);
            color: var(--light-color);
            font-size: 1.2em;
            line-height: 1.5;
        }

        .result {
            font-size: 2em;
            font-weight: bold;
            margin: 20px 0;
            padding: 20px;
            border-radius: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .win {
            background: linear-gradient(135deg, #00ff00, #00cc00);
            color: var(--dark-color);
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .lose {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: var(--light-color);
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { transform: translateY(-100px) translateX(100px); opacity: 1; }
            100% { transform: translateY(-200px) translateX(200px); opacity: 0; }
        }

        .footer {
            width: 100%;
            padding: 20px;
            text-align: center;
            margin-top: auto;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .language-selector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
        }

        .language-selector img {
            width: 24px;
            height: 24px;
            cursor: pointer;
            border-radius: 4px;
            transition: transform 0.2s;
        }

        .language-selector img:hover {
            transform: scale(1.1);
        }

        .footer-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .footer-links a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: var(--secondary-color);
        }

        .btc-address {
            word-break: break-all;
            color: var(--primary-color);
        }

        .info-button {
            background: var(--primary-color);
            border: none;
            padding: 8px 16px;
            border-radius: 15px;
            color: var(--light-color);
            cursor: pointer;
            margin: 0 10px;
        }

        .copy-button {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--light-color);
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Orbitron', sans-serif;
            margin: 20px auto;
            display: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .copy-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(247, 147, 26, 0.5);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }

        .modal-content {
            position: relative;
            background: var(--dark-color);
            margin: 15% auto;
            padding: 20px;
            width: 90%;
            max-width: 600px;
            border-radius: 15px;
            border: 2px solid var(--primary-color);
        }

        .close-modal {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 24px;
            cursor: pointer;
            color: var(--light-color);
        }

        @media (max-width: 768px) {
            .modal-content {
                margin: 10% auto;
                width: 95%;
                max-height: 80vh;
                overflow-y: auto;
            }
        }

        .wallet-address {
            word-break: break-all;
            padding: 10px;
            font-size: clamp(0.8em, 4vw, 1em);
        }

        .modal-content a {
            color: var(--primary-color);
            text-decoration: none;
            padding: 2px 5px;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .modal-content a:hover {
            background-color: var(--primary-color);
            color: var(--light-color);
        }

        .modal-content ul {
            margin: 20px 0;
        }

        .modal-content li {
            margin: 10px 0;
            line-height: 1.5;
        }

</head>

        function detectBrowserLanguage() {
            const supportedLanguages = ['en', 'pt', 'es', 'zh', 'hi', 'ar', 'bn', 'ru'];
            
            let browserLang = navigator.language || navigator.userLanguage;
            
            if (!browserLang) return 'en';
            
            browserLang = browserLang.split('-')[0].toLowerCase();
            
            if (supportedLanguages.includes(browserLang)) {
                return browserLang;
            }
            
            return 'en';
        }

        function updateLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (i18n[lang] && i18n[lang][key]) {
                    element.innerHTML = i18n[lang][key];
                }
            });

            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        }

        function showModal() {
            const modal = document.getElementById('infoModal');
            const content = document.querySelector('.modal-content [data-i18n="modal.content"]');
            if (content) {
                content.innerHTML = i18n[currentLang]['modal.content'];
            }
            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('infoModal').style.display = 'none';
        }

        document.querySelectorAll('.language-selector img').forEach(img => {
            img.addEventListener('click', () => {
                updateLanguage(img.getAttribute('data-lang'));
            });
        });

        window.onclick = function(event) {
            if (event.target == document.getElementById('infoModal')) {
                closeModal();
            }
        }

        updateLanguage(detectBrowserLanguage());

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particlesContainer.appendChild(particle);
            }
        }

        createParticles();

        let isSpinning = false;
        let currentAttempt = 0;
        const MAX_ATTEMPTS = 50000;
        const TARGET_ADDRESS = '19vkiEajfhuZ8bs8Zu2jgmC6oqZbWqhxhG';
        const CHALLENGE_NUMBER = '69';
        const CHALLENGE_PRIZE = '6.9';
        let hasAttempted = false;

        const urlParams = new URLSearchParams(window.location.search);
        const simulateWin = urlParams.get('win') === 'true';

        async function start() {
            if (isSpinning) return;
            
            isSpinning = true;
            clearLog();
            log('challenge.title', { number: CHALLENGE_NUMBER });
            log('search.starting');
            await startAnimation();
            
            if (simulateWin) {
                await showResult(true, BigInt('0x1fffffffffffffffff'));
            } else {
                await checkAddresses();
            }
        }

        function startAnimation() {
            return new Promise(resolve => {
                document.getElementById("start").style.display = 'none';    
                document.getElementById("matrix").style.display = 'block';
                setTimeout(resolve, 3000);
            });
        }

        async function checkAddresses() {
            const privateKeyInt = generateRandomNumber(0x100000000000000000, 0x1fffffffffffffffff);
            
            for (let i = 0; i < MAX_ATTEMPTS; i++) {
                const address = generateAddress(privateKeyInt + BigInt(i));
                
                if (address === TARGET_ADDRESS) {
                    await showResult(true, privateKeyInt + BigInt(i));
                    return;
                }
            }
            
            await showResult(false, privateKeyInt + BigInt(MAX_ATTEMPTS));
        }

        async function showResult(success, privateKey) {
            if (success) {
                document.body.classList.add('win-theme');
                document.getElementById("matrix").style.display = 'block';
                
                const walletImages = document.querySelectorAll('.wallet-image');
                const containerWidth = document.getElementById("matrix").offsetWidth;
                const imageWidth = 100;
                const totalImages = walletImages.length;
                const totalSpace = containerWidth - (totalImages * imageWidth);
                const spacing = totalSpace / (totalImages + 1);
                
                walletImages.forEach((img, index) => {
                    img.style.animationName = 'none';
                    img.style.right = 'auto';
                    img.style.left = `${spacing + (index * (imageWidth + spacing))}px`;
                    img.style.top = '25px';
                    void img.offsetWidth;
                    img.classList.add('celebrate');
                    img.style.filter = 'drop-shadow(0 0 15px var(--accent-color))';
                    img.style.background = 'radial-gradient(circle, rgba(0, 255, 0, 0.2), transparent)';
                    for (let i = 0; i < 5; i++) {
                        const sparkle = document.createElement('div');
                        sparkle.className = 'sparkle';
                        img.appendChild(sparkle);
                    }
                });

                log('wallet.address', { address: TARGET_ADDRESS });
                log('challenge.solved', { number: CHALLENGE_NUMBER });
                log('private.key.found', { key: privateKey.toString(16) });
                log('prize.won', { prize: CHALLENGE_PRIZE });
                log('donation.reminder');
                
                const copyButton = document.createElement('button');
                copyButton.className = 'copy-button';
                copyButton.textContent = i18n[currentLang]['button.copy'];
                copyButton.style.display = 'block';
                copyButton.onclick = () => {
                    navigator.clipboard.writeText(privateKey.toString(16));
                    copyButton.textContent = i18n[currentLang]['button.copied'];
                    setTimeout(() => {
                        copyButton.textContent = i18n[currentLang]['button.copy'];
                    }, 2000);
                };
                document.getElementById('console').appendChild(copyButton);
                
                document.getElementById("start").style.display = 'none';
            } else {
                document.getElementById("matrix").style.display = 'none';
                log('keep.trying');
                log('last.key.checked', { key: privateKey.toString(16) });
                
                const startButton = document.getElementById("start");
                startButton.style.display = '';
                startButton.textContent = i18n[currentLang]['button.retry'];
            }
            
            hasAttempted = true;
            isSpinning = false;
        }

        function clearLog() {
            document.getElementById('console').innerHTML = '';
        }

        function log(message, params = {}) {
            const consoleDiv = document.getElementById('console');
            if (message in i18n[currentLang]) {
                let translatedMessage = i18n[currentLang][message];
                Object.entries(params).forEach(([key, value]) => {
                    translatedMessage = translatedMessage.replace(`\${${key}}`, value);
                });
                consoleDiv.innerHTML += translatedMessage + '<br>';
            } else {
                consoleDiv.innerHTML += message + '<br>';
            }
        }

        function generateAddress(privateKeyInt) {
            const privateKey = privateKeyInt.toString(16);
            const EC = elliptic.ec;
            const ec = new EC('secp256k1');
            const keyPair = ec.keyFromPrivate(privateKey, 'hex');
            const publicKey = keyPair.getPublic(true, 'hex');

            const sha256Hash = CryptoJS.SHA256(CryptoJS.enc.Hex.parse(publicKey));
            const ripemd160Hash = CryptoJS.RIPEMD160(sha256Hash);

            const version = '00';
            const versionedHash = version + ripemd160Hash.toString();
            const checksum = CryptoJS.SHA256(CryptoJS.SHA256(CryptoJS.enc.Hex.parse(versionedHash))).toString().substring(0, 8);
            const addressHex = versionedHash + checksum;

            return hexToBase58(addressHex);
        }

        function hexToBase58(hex) {
            const alphabet = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
            const base = BigInt(58);
            let num = BigInt('0x' + hex);
            let encoded = '';
            
            while (num > 0) {
                const remainder = num % base;
                num = num / base;
                encoded = alphabet[remainder] + encoded;
            }

            for (let i = 0; i < hex.length && hex[i] === '0'; i += 2) {
                encoded = '1' + encoded;
            }

            return encoded;
        }

        function generateRandomNumber(min, max) {
            const range = BigInt(max - min);
            const randomBytes = new Uint8Array(32);
            window.crypto.getRandomValues(randomBytes);
            let hexString = Array.from(randomBytes).map(b => b.toString(16).padStart(2, "0")).join('');
            return BigInt(min) + (BigInt(`0x${hexString}`) % range);
        }
